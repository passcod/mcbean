[package]
name = "mcbean"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
axum = { version = "0.8.8", optional = true }
chrono = { version = "0.4.44", features = ["serde"] }
console_error_panic_hook = { version = "0.1.7", optional = true }
deadpool-diesel = { version = "0.6.1", features = ["postgres"], optional = true }
diesel = { version = "2.3.7", features = ["postgres", "chrono"], optional = true }
hex = { version = "0.4.3", optional = true }
leptos = "0.8.17"
leptos_axum = { version = "0.8.8", optional = true }
leptos_meta = "0.8.6"
leptos_router = "0.8.12"
rand = { version = "0.10.0", optional = true }
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.50.0", features = ["full"], optional = true }
tower = { version = "0.5.3", optional = true }
tower-http = { version = "0.6.8", features = ["fs"], optional = true }
wasm-bindgen = { version = "0.2.114", optional = true }

[features]
hydrate = [
    "leptos/hydrate",
    "dep:wasm-bindgen",
    "dep:console_error_panic_hook",
]
ssr = [
    "leptos/ssr",
    "leptos_meta/ssr",
    "leptos_router/ssr",
    "dep:axum",
    "dep:leptos_axum",
    "dep:tokio",
    "dep:tower",
    "dep:tower-http",
    "dep:diesel",
    "dep:deadpool-diesel",
    "dep:rand",
    "dep:hex",
]

[package.metadata.leptos]
output-name = "mcbean"
site-root = "target/site"
site-pkg-dir = "pkg"
style-file = "style/main.css"
assets-dir = "public"
site-addr = "127.0.0.1:3000"
reload-port = 3001
env = "DEV"
bin-features = ["ssr"]
lib-features = ["hydrate"]
